name: Build & Deploy workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Ambil list branches dari API & generate matrix
        id: set-matrix
        run: |
          echo "Fetching branches…"
          sudo apt-get update && sudo apt-get install -y jq
          json=$(curl -sS --max-time 10 https://emr.clenicapp.com/api/get-branches) || true
          if [ -z "${json}" ] || ! echo "${json}" | jq -e . >/dev/null 2>&1; then
            echo "Warning: failed to fetch or parse branches API response; using empty matrix."
            matrix='[]'
          else
            matrix=$(echo "${json}" | jq -c '.data' 2>/dev/null) || matrix='[]'
          fi
          echo "Matrix: $matrix"
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      - name: Cache NPM
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build app
        run: npm run build -- --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: ./dist/clenicappdemo/
          retention-days: 1

  deploy:
    needs: [build, generate-matrix]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: "${{ fromJson(needs.generate-matrix.outputs.matrix) }}"

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: ./dist/clenicappdemo/

      - name: SFTP Deploy to tabaro
        uses: easingthemes/ssh-deploy@v5.0.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }} # default 22 jika tidak diisi
          SOURCE: "./dist/clenicappdemo/"
          TARGET: "/home/clenicapp.com/${{ matrix.folder }}.clenicapp.com/v1-test/"
          ARGS: "-avz --delete"
